version: '3.8'

services:

  db:
    image: postgres:14
    environment:
      POSTGRES_DB: genomics_db
      POSTGRES_USER: genomics_user
      POSTGRES_PASSWORD: genomics123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/crispr_migration.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genomics_user -d genomics_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: genomics_db
      DB_USER: genomics_user
      DB_PASSWORD: genomics123
      DB_PORT: 5432
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - db

volumes:
  postgres_data: